name: Collecte Auto Trafic PAA

on:
  # Déclencheur UNIQUE = cron EXTERNE (cron-job.org), toutes les 5 min, via
  # l'API GitHub workflow_dispatch. Le `schedule:` natif de GitHub a été RETIRÉ
  # volontairement : le garder ferait DOUBLON avec cron-job.org (collecte en
  # double → quota TomTom gaspillé). Ne pas le réintroduire.
  # Config cron-job.org : POST sur
  #   /repos/Titan-N2A/portflow/actions/workflows/collecte_auto.yml/dispatches
  #   body {"ref":"main"}, intervalle 5 min.
  # Quota : 5 min = 288 runs/j × 6 routes = 1 728 req TomTom/j (plafond gratuit
  # 2 500/j, PARTAGÉ avec l'ETA du front-end → ~772/j de marge, à surveiller).
  # Filet si cron-job.org tombe : déclencher manuellement le workflow.
  workflow_dispatch: # déclenché par cron-job.org (ou manuellement depuis GitHub)

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Exécuter la collecte trafic
        env:
          TOMTOM_KEY: ${{ secrets.TOMTOM_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GOOGLE_MATRIX_API_KEY: ${{ secrets.GOOGLE_MATRIX_API_KEY }}
          # Alertes congestion par email (optionnel — désactivé si absent)
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          FLOWPORT_BOT_EMAIL: ${{ secrets.FLOWPORT_BOT_EMAIL }}
          FLOWPORT_BOT_PASSWORD: ${{ secrets.FLOWPORT_BOT_PASSWORD }}
        run: node scripts/collecte.js
