name: Collecte Auto Trafic PAA

on:
  schedule:
    # Toutes les 5 min, 24h/24, 7j/7 (port opère en continu).
    # 5 min = minimum réaliste sur GitHub Actions (le scheduler ne garantit
    # pas de délai plus court, et peut retarder sous charge indépendamment
    # de l'intervalle configuré — voir le bouton "Actualiser" du dashboard
    # comme filet de secours manuel pour forcer une donnée fraîche).
    - cron: '*/5 * * * *'
  workflow_dispatch: # déclenchement manuel depuis GitHub

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Exécuter la collecte trafic
        env:
          TOMTOM_KEY: ${{ secrets.TOMTOM_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GOOGLE_MATRIX_API_KEY: ${{ secrets.GOOGLE_MATRIX_API_KEY }}
        run: node scripts/collecte.js
