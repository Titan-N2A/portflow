name: Collecte Auto Trafic PAA

on:
  schedule:
    # Toutes les 15 min, 24h/24, 7j/7 (port opère en continu).
    # 15 min (et non 5) pour caler la consommation Google Distance Matrix
    # sur l'enveloppe gratuite : ~6 éléments × 96 collectes/j ≈ 17 000/mois,
    # dans le quota gratuit (à 5 min c'était ~52 000/mois, hors quota).
    # Le graphe étant une moyenne PAR HEURE, 4 relevés/heure suffisent.
    # Le scheduler GitHub peut retarder sous charge — le bouton "Actualiser"
    # du dashboard reste le filet de secours manuel pour une donnée fraîche.
    - cron: '*/15 * * * *'
  workflow_dispatch: # déclenchement manuel depuis GitHub

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Exécuter la collecte trafic
        env:
          TOMTOM_KEY: ${{ secrets.TOMTOM_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GOOGLE_MATRIX_API_KEY: ${{ secrets.GOOGLE_MATRIX_API_KEY }}
          # Alertes congestion par email (optionnel — désactivé si absent)
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          FLOWPORT_BOT_EMAIL: ${{ secrets.FLOWPORT_BOT_EMAIL }}
          FLOWPORT_BOT_PASSWORD: ${{ secrets.FLOWPORT_BOT_PASSWORD }}
        run: node scripts/collecte.js
