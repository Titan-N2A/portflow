name: Calibrer les références horaires

# Recalcule chaque semaine les médianes horaires par axe/sens depuis
# les relevés réels (7 derniers jours) — la heatmap et la synthèse de
# la page Graphiques se comparent ainsi au trafic récent plutôt qu'à
# la base figée de février 2025.
# Déclenché par cron-job.org chaque lundi à 08h00 UTC — APRÈS le reset du quota
# Firestore (~07h UTC). L'ancien horaire (04h UTC) tombait AVANT le reset : la
# lecture des 7 derniers jours de relevés échouait en 429. schedule GitHub natif
# retiré (source unique = cron-job.org). Config cron-job.org : POST
# .../workflows/calibrer_references.yml/dispatches, body {"ref":"main"}, lundi 08:00.
on:
  workflow_dispatch:

jobs:
  calibrer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Calibrer et publier les références
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FLOWPORT_BOT_EMAIL: ${{ secrets.FLOWPORT_BOT_EMAIL }}
          FLOWPORT_BOT_PASSWORD: ${{ secrets.FLOWPORT_BOT_PASSWORD }}
        run: node scripts/calibrer_references.js
