name: Bilan hebdomadaire FlowPort — email

# Chaque lundi à 6h45 UTC (après le récap matinal de 6h30) : bilan chiffré
# de la semaine écoulée vs la précédente, depuis les agrégats quotidiens.
# Déclenché par un cron EXTERNE précis (cron-job.org) via l'API GitHub
# workflow_dispatch, à 6h45 UTC pile chaque lundi. Le `schedule:` natif a été
# retiré volontairement (dérive 5-30 min + doublon email). Config cron-job.org :
# POST sur /repos/Titan-N2A/portflow/actions/workflows/bilan_hebdo.yml/dispatches
# body {"ref":"main"}, uniquement le lundi.
on:
  workflow_dispatch: # déclenché par cron-job.org (ou manuellement depuis GitHub)

jobs:
  bilan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Envoyer le bilan hebdomadaire
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          FLOWPORT_BOT_EMAIL: ${{ secrets.FLOWPORT_BOT_EMAIL }}
          FLOWPORT_BOT_PASSWORD: ${{ secrets.FLOWPORT_BOT_PASSWORD }}
        run: node scripts/bilan_hebdo.js
