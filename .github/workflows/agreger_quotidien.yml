name: Agréger la collecte quotidienne

# Compacte chaque nuit la journée de collecte écoulée en agrégats
# par axe/sens (min/moy/max/niveaux) — la page Graphiques lit ces
# agrégats pour ses vues 7 j / 30 j au lieu des relevés bruts.
# Rattrapage automatique des jours manquants (max 6 par run).
#
# Déclenché par un cron EXTERNE (cron-job.org) chaque jour à 07h30 UTC,
# APRÈS la réinitialisation quotidienne du quota Firestore (~07h00 UTC, plan
# Spark gratuit = 50 000 lectures/j). L'ancien horaire (02h00 UTC) tombait
# AVANT le reset : le script lisait collecte_auto alors que le quota du jour
# était déjà épuisé → 429 RESOURCE_EXHAUSTED, agrégation en échec systématique.
# Le schedule GitHub natif est retiré (imprécis + risque de doublon).
# Config cron-job.org : POST sur
#   /repos/Titan-N2A/portflow/actions/workflows/agreger_quotidien.yml/dispatches
#   body {"ref":"main"}, à 07h30 (fuseau UTC/Reykjavik).
on:
  workflow_dispatch: # déclenché par cron-job.org (ou manuellement depuis GitHub)

jobs:
  agreger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Agréger les journées manquantes
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FLOWPORT_BOT_EMAIL: ${{ secrets.FLOWPORT_BOT_EMAIL }}
          FLOWPORT_BOT_PASSWORD: ${{ secrets.FLOWPORT_BOT_PASSWORD }}
        run: node scripts/agreger_quotidien.js
