name: Deploy PortFlow — Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          # Valeurs publiques Firebase (non sensibles — embarquées dans tout app web Firebase)
          VITE_FIREBASE_API_KEY: AIzaSyAnjGSgFXIB1cSvslFbUdiTjB6zrUmHhwc
          VITE_FIREBASE_AUTH_DOMAIN: portflow-46738.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: portflow-46738
          VITE_FIREBASE_STORAGE_BUCKET: portflow-46738.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "330399151120"
          VITE_FIREBASE_APP_ID: 1:330399151120:web:9e3116bb2b6ba6c3598695
          # Clés API (à ajouter dans GitHub Settings → Secrets → Actions)
          VITE_TOMTOM_API_KEY: ${{ secrets.VITE_TOMTOM_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GOOGLE_MATRIX_API_KEY: ${{ secrets.VITE_GOOGLE_MATRIX_API_KEY }}

      - name: Déployer sur Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTFLOW_46738 }}
          projectId: portflow-46738
          channelId: live
