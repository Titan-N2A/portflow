name: Deploy PortFlow — Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAnjGSgFXIB1cSvslFbUdiTjB6zrUmHhwc
          VITE_FIREBASE_AUTH_DOMAIN: portflow-46738.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: portflow-46738
          VITE_FIREBASE_STORAGE_BUCKET: portflow-46738.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "330399151120"
          VITE_FIREBASE_APP_ID: 1:330399151120:web:9e3116bb2b6ba6c3598695
          VITE_TOMTOM_API_KEY: OKRpdcKYIWdRTpEyr3eHab19LOQizhdZ
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GOOGLE_MATRIX_API_KEY: AIzaSyBsm4oMoYDdpfRX6hDQr3lKu5IaJRjlXBo

      - name: Déployer sur Firebase Hosting
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTFLOW_46738 }}' > /tmp/sa.json
          npx firebase-tools deploy --only hosting --project portflow-46738 --non-interactive 2>&1 | tee /tmp/deploy.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ] && grep -q "is the current active version" /tmp/deploy.log; then
            echo "✅ Version déjà active — déploiement considéré réussi."
            exit 0
          fi
          exit $EXIT
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Déployer les règles Firestore
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTFLOW_46738 }}' > /tmp/sa.json
          npx firebase-tools deploy --only firestore:rules --project portflow-46738 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
