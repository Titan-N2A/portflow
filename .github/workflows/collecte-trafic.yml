name: Collecte trafic PortFlow

on:
  workflow_dispatch: # désactivé — remplacé par collecte_auto.yml (Google Matrix + TomTom fallback)

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        working-directory: ./collector
        run: npm install

      - name: Lancer la collecte
        working-directory: ./collector
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_MATRIX_API_KEY: ${{ secrets.GOOGLE_MATRIX_API_KEY }}
        run: npm run collecte