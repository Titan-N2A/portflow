name: Récap matinal FlowPort — email

# Déclenché par un cron EXTERNE précis (cron-job.org) via l'API GitHub
# workflow_dispatch, à 6h30 UTC (= 6h30 Abidjan) pile chaque jour.
# Le `schedule:` natif de GitHub a été retiré volontairement : il dérive de
# 5-30 min sous charge et ferait DOUBLON (double email) avec le déclencheur
# externe. Config cron-job.org : POST sur
# /repos/Titan-N2A/portflow/actions/workflows/recap_matinal.yml/dispatches
# body {"ref":"main"} — voir la procédure de planification externe.
on:
  workflow_dispatch: # déclenché par cron-job.org (ou manuellement depuis GitHub)

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Envoyer le récapitulatif
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          FLOWPORT_BOT_EMAIL: ${{ secrets.FLOWPORT_BOT_EMAIL }}
          FLOWPORT_BOT_PASSWORD: ${{ secrets.FLOWPORT_BOT_PASSWORD }}
        run: node scripts/recap.js
