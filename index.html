<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowPort — PAA Trafic Routier</title>
    <!-- PWA : installable sur bureau et écran d'accueil mobile -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0A2342" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlowPort" />
    <script>
      // Capture AU PLUS TÔT de l'invite d'installation PWA : Chrome peut
      // l'émettre avant que React ait monté ses écouteurs — sans cette
      // capture précoce, le bouton « Installer l'application » ne
      // s'affichait jamais (événement déjà passé).
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault()
        window.__fpInstallEvent = e
        window.dispatchEvent(new Event('fp-install-ready'))
      })
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
